# Order Service Configuration
# This file contains all configuration settings for the order service

# ===== SPRING BOOT =====
spring.application.name=order-service
server.port=8080
server.servlet.context-path=/

# ===== INVENTORY SERVICE =====
# URL of the inventory service
inventory.service.url=http://localhost:8081

# How many times to retry if inventory service is slow (1-5 recommended)
inventory.service.retries=3

# Maximum time to wait for inventory service response (in milliseconds)
# 5000 = 5 seconds
inventory.service.timeout=5000

# ===== LOGGING =====
# Log levels: ERROR, WARN, INFO, DEBUG, TRACE
logging.level.root=WARN
logging.level.com.order=INFO

# Log format
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%-5level] %logger{36} - %msg%n
logging.file.name=logs/order-service.log

# ===== APPLICATION PROFILES =====
# Profiles: dev, staging, production
spring.profiles.active=dev
